# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: CMake assets

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-assets:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        build_type: [Release]
        c_compiler: [clang]
        include:
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/ggml/build" >> "$GITHUB_OUTPUT"
        echo "source-dir=${{ github.workspace }}/ggml" >> "$GITHUB_OUTPUT"

    - name: Configure ggml
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DLOCALVQE_BUILD_SHARED=ON
        -S ${{ steps.strings.outputs.source-dir }}

    - name: Build ggml
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: |
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
        cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }} --target regression-assets

    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: bench_assets
        path: ${{ steps.strings.outputs.build-output-dir }}/bench_assets
  build-windows:
    runs-on: windows-latest
    needs: build-assets
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest]
        build_type: [Release]
        c_compiler: [cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
    
    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      # Turn repeated input strings (such as the build output directory) into step outputs. These step outputs can be used throughout the workflow file.
      id: strings
      shell: bash
      run: |
        echo "bench-assets-dir=${{ github.workspace }}/bench_assets" >> "$GITHUB_OUTPUT"
        echo "build-output-dir=${{ github.workspace }}/obs-plugin/build" >> "$GITHUB_OUTPUT"
        echo "source-dir=${{ github.workspace }}/obs-plugin" >> "$GITHUB_OUTPUT"
    - name: Download bench assets
      uses: actions/download-artifact@v8
      with:
        name: bench_assets
        path: ${{ steps.strings.outputs.bench-assets-dir }}
        
    - name: Copy bench asset
      run: cp ${{ steps.strings.outputs.bench-assets-dir }}/localvqe-v1.3-4.8M-f32.gguf ${{ steps.strings.outputs.source-dir }}/data/localvqe-v1.3-4.8M-f32.gguf
      
    - name: Build ggml
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.ggml-build-output-dir }} --config ${{ matrix.build_type }}

    - name: Configure obs-plugin
      # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
      # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -S ${{ steps.strings.outputs.source-dir }}

    - name: Build obs-plugin
      # Build your program with the given configuration. Note that --config is needed because the default Windows generator is a multi-config generator (Visual Studio generator).
      run: cmake --build ${{ steps.strings.outputs.obs-plugin-source-dir }} --config ${{ matrix.build_type }}

    - name: Upload build
      uses: actions/upload-artifact@v7
      with:
        name: obs-plugin
        path: ${{ steps.strings.outputs.build-output-dir }}
