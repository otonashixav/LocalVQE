# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: Checkout obs
      uses: actions/checkout@v7
      with:
        submodules: recursive
        repository: obsproject/obs-plugintemplate
        path: obs-plugintemplate
    - name: Install pkgconfig
      run: choco install pkgconfiglite
    - name: Build assets
      run: |
        cmake -S ggml -B ggml/build -DCMAKE_BUILD_TYPE=Release -DLOCALVQE_BUILD_SHARED=ON
        (Get-Content ggml/CMakeLists.txt).Replace(' SHARED ', ' STATIC ') | Set-Content ggml/CMakeLists.txt
        cmake --build ggml/build
        cmake --build ggml/build --target regression-assets
    - name: Copy plugin assets
      run: |
        cp ggml/build/bench_assets/localvqe-v1.3-4.8M-f32.gguf obs-plugin/data/
        cp obs-plugin/src obs-plugintemplate -Recurse -Force
        cp obs-plugin/data obs-plugintemplate -Recurse -Force
        (Get-Content obs-plugintemplate/CMakeLists.txt).Replace('src/plugin-main.c', 'src/plugin-main.c src/localvqe-filter.c') | Set-Content obs-plugintemplate/CMakeLists.txt
        (Get-Content obs-plugintemplate/CMakePresets.json).Replace('"CMAKE_COMPILE_WARNING_AS_ERROR": true', '"CMAKE_COMPILE_WARNING_AS_ERROR": false') | Set-Content obs-plugintemplate/CMakePresets.json
        (Get-Content obs-plugintemplate/buildspec.json).Replace('plugintemplate-for-obs', 'obs-localvqe') | Set-Content obs-plugintemplate/buildspec.json
        (Get-Content obs-plugintemplate/buildspec.json).Replace('Plugin Template for OBS', 'Local Voice Quality Enhancement') | Set-Content obs-plugintemplate/buildspec.json
        echo 'find_path(LOCALVQE_INCLUDE_DIR NAMES localvqe_api.h HINTS ${CMAKE_SOURCE_DIR}/../ggml)' >> obs-plugintemplate/CMakeLists.txt
        echo
        echo 'set(CMAKE_FIND_LIBRARY_SUFFIXES_BACKUP ${CMAKE_FIND_LIBRARY_SUFFIXES})' >> obs-plugintemplate/CMakeLists.txt
        echo 'set(CMAKE_FIND_LIBRARY_SUFFIXES ".lib") ' >> obs-plugintemplate/CMakeLists.txt
        echo 'find_library(LOCALVQE_LIBRARY NAMES localvqe HINTS ${CMAKE_SOURCE_DIR}/../ggml/build/Debug)' >> obs-plugintemplate/CMakeLists.txt
        echo 'set(CMAKE_FIND_LIBRARY_SUFFIXES ${CMAKE_FIND_LIBRARY_SUFFIXES_BACKUP})' >> obs-plugintemplate/CMakeLists.txt
        echo 'target_include_directories(${CMAKE_PROJECT_NAME} PRIVATE ${LOCALVQE_INCLUDE_DIR})' >> obs-plugintemplate/CMakeLists.txt
        echo 'add_library(LOCALVQE_LIBRARY STATIC IMPORTED)' >> obs-plugintemplate/CMakeLists.txt
    - name: Build plugin
      run: pwsh -File obs-plugintemplate/.github/scripts/Build-Windows.ps1
    - name: Upload plugin
      uses: actions/upload-artifact@v7
      with:
        name: obs-plugin
        path: obs-plugintemplate
    - name: Upload assets
      uses: actions/upload-artifact@v7
      with:
        name: assets
        path: ggml/build

    
    
