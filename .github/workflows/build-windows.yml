# This starter workflow is for a CMake project running on multiple platforms. There is a different starter workflow if you just want a single platform.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-single-platform.yml
name: Build Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-assets:
    runs-on: windows-2022
    steps:
    - uses: actions/checkout@v7
      with:
        submodules: recursive
    - name: Checkout obs
      uses: actions/checkout@v7
      with:
        submodules: recursive
        repository: obsproject/obs-studio
        path: obs-studio
        ref: "32.1.2"
    - name: Checkout obs-deps
      uses: actions/checkout@v7
      with:
        submodules: recursive
        repository: obsproject/obs-deps
        path: obs-deps
    - name: Build obs-deps
      run: |
        cd obs-deps
        pwsh -File Build-Dependencies.ps1
        cd ..
    - name: Build obs
      run: |
        cd obs-studio
        cmake --preset windows-ci-x64
        cmake --build --preset windows-x64
        cd ..
    - name: Build assets
      run: |
        cmake -S ggml -B ggml/build -DCMAKE_BUILD_TYPE=Release -DLOCALVQE_BUILD_SHARED=ON
        cmake --build ggml/build
        cmake --build ggml/build --target regression-assets
    - name: Copy bench asset
      run: cp ggml/build/bench_assets/localvqe-v1.3-4.8M-f32.gguf obs-plugin/data/localvqe-v1.3-4.8M-f32.gguf
    - name: Get pkgconfig
      run: choco install pkgconfiglite
    - name: Build plugin
      run: |
        $env:PKG_CONFIG_PATH="D:/a/LocalVQE/LocalVQE/obs-deps/windows/obs-dependencies-x64/lib/pkgconfig"
        cmake -S obs-plugin -B obs-plugin/build -DCMAKE_BUILD_TYPE=Release -Dlibobs_ROOT="obs-studio/build_x64/libobs" -Dw32-pthreads_ROOT="obs-studio/build_x64/deps/w32-pthreads" -DSIMDe_ROOT="obs-deps/windows/obs-dependencies-x64"
        cmake --build obs-plugin/build
    - name: Upload plugin
      uses: actions/upload-artifact@v7
      with:
        name: obs-plugin
        path: obs-studio

    
    
